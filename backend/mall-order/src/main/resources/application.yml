server:
  port: 8085

spring:
  application:
    name: mall-order
  datasource:
    url: jdbc:mysql://localhost:3306/mall_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

rocketmq:
  name-server: localhost:9876
  producer:
    group: mall-order-producer

seata:
  enabled: true
  application-id: mall-order
  tx-service-group: mall-tx-group

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
