services:
  mysql:
    image: mysql:8.0
    container_name: mall-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/:/docker-entrypoint-initdb.d/
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mall-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.2
    container_name: mall-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - mall-net
    # IK analyzer and pinyin plugins require a custom image or manual installation:
    # elasticsearch-plugin install https://github.com/medcl/elasticsearch-analysis-ik/releases/download/v8.13.2/elasticsearch-analysis-ik-8.13.2.zip
    # elasticsearch-plugin install https://github.com/medcl/elasticsearch-analysis-pinyin/releases/download/v8.13.2/elasticsearch-analysis-pinyin-8.13.2.zip

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: mall-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    networks:
      - mall-net

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: mall-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    volumes:
      - rocketmq-namesrv-logs:/home/rocketmq/logs
    networks:
      - mall-net

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: mall-rocketmq-broker
    ports:
      - "10911:10911"
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876
    volumes:
      - rocketmq-broker-store:/home/rocketmq/store
      - rocketmq-broker-logs:/home/rocketmq/logs
    networks:
      - mall-net

  zipkin:
    image: openzipkin/zipkin:3
    container_name: mall-zipkin
    ports:
      - "9411:9411"
    networks:
      - mall-net

  minio:
    image: minio/minio:latest
    container_name: mall-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - mall-net

networks:
  mall-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  elasticsearch-data:
  nacos-data:
  nacos-logs:
  rocketmq-namesrv-logs:
  rocketmq-broker-store:
  rocketmq-broker-logs:
  minio-data:
